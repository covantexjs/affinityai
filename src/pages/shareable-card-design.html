<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shareable Archetype Card | Affinity AI</title>
    <style>
        :root {
            --primary: #6c5ce7;
            --primary-light: #a29bfe;
            --secondary: #fd79a8;
            --secondary-light: #fab1c9;
            --dark: #2d3436;
            --light: #f9f9f9;
            --gray: #dfe6e9;
            --gradient-start: #6c5ce7;
            --gradient-end: #fd79a8;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        
        body {
            background-color: var(--light);
            color: var(--dark);
            line-height: 1.6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            width: 100%;
        }
        
        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            position: relative;
        }
        
        .card-header {
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            padding: 30px;
            color: white;
            text-align: center;
            position: relative;
        }
        
        .card-header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 30px;
            background: white;
            border-radius: 50% 50% 0 0 / 100% 100% 0 0;
        }
        
        .logo {
            position: absolute;
            top: 20px;
            left: 20px;
            font-weight: 700;
            font-size: 1.2rem;
            opacity: 0.9;
        }
        
        .archetype-name {
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: 800;
        }
        
        .archetype-tagline {
            font-size: 1.2rem;
            font-style: italic;
            margin-bottom: 20px;
            opacity: 0.9;
        }
        
        .card-body {
            padding: 30px;
            text-align: center;
        }
        
        .archetype-keywords {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 25px;
        }
        
        .keyword {
            background: var(--gray);
            padding: 8px 15px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 500;
        }
        
        .compatibility {
            margin-bottom: 25px;
        }
        
        .compatibility h3 {
            color: var(--primary);
            margin-bottom: 10px;
            font-size: 1.2rem;
        }
        
        .qr-section {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 25px;
        }
        
        .qr-code {
            width: 100px;
            height: 100px;
            background: var(--gray);
            margin-right: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.8rem;
            color: var(--dark);
        }
        
        .qr-text {
            flex: 1;
            text-align: left;
        }
        
        .qr-text p {
            font-size: 0.9rem;
            margin-bottom: 5px;
        }
        
        .qr-text strong {
            color: var(--primary);
        }
        
        .card-footer {
            background: var(--light);
            padding: 20px;
            text-align: center;
            border-top: 1px solid var(--gray);
        }
        
        .card-footer p {
            font-size: 0.9rem;
            color: var(--dark);
            opacity: 0.7;
        }
        
        .social-icons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
        }
        
        .social-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--gray);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .social-icon:hover {
            background: var(--primary-light);
            transform: translateY(-3px);
        }
        
        .social-icon svg {
            width: 20px;
            height: 20px;
            fill: var(--dark);
        }
        
        .social-icon:hover svg {
            fill: white;
        }
        
        .decoration {
            position: absolute;
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--gradient-start), transparent);
            opacity: 0.1;
            z-index: 0;
        }
        
        .decoration-1 {
            top: -50px;
            right: -50px;
        }
        
        .decoration-2 {
            bottom: -50px;
            left: -50px;
            background: linear-gradient(135deg, var(--gradient-end), transparent);
        }
        
        .card-actions {
            margin-top: 30px;
            display: flex;
            justify-content: center;
        }
        
        .action-button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }
        
        .action-button:hover {
            background: var(--primary-light);
            transform: translateY(-2px);
        }
        
        @media (max-width: 480px) {
            .archetype-name {
                font-size: 2rem;
            }
            
            .qr-section {
                flex-direction: column;
            }
            
            .qr-code {
                margin-right: 0;
                margin-bottom: 15px;
            }
            
            .qr-text {
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="decoration decoration-1"></div>
            <div class="decoration decoration-2"></div>
            
            <div class="card-header">
                <div class="logo">Affinity AI</div>
                <h1 class="archetype-name">Narrative Idealist</h1>
                <p class="archetype-tagline">"Love is a story I want to co-write."</p>
            </div>
            
            <div class="card-body">
                <div class="archetype-keywords">
                    <span class="keyword">Deep-feeling</span>
                    <span class="keyword">Poetic</span>
                    <span class="keyword">Nostalgic</span>
                    <span class="keyword">✨</span>
                </div>
                
                <div class="compatibility">
                    <h3>Top Matches</h3>
                    <p>Grounded Harmonizer & Cosmic Cynic</p>
                </div>
                
                <div class="qr-section">
                    <div class="qr-code">QR Code</div>
                    <div class="qr-text">
                        <p>Scan to discover <strong>your</strong> romantic archetype</p>
                        <p>Or visit: <strong>affinity.ai/quiz</strong></p>
                    </div>
                </div>
                
                <div class="card-actions">
                    <a href="#" class="action-button">Take the Quiz</a>
                </div>
            </div>
            
            <div class="card-footer">

                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
